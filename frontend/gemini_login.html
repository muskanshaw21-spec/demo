<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini - Corporate Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0b0f19;
            --secondary-bg: rgba(255, 255, 255, 0.03);
            --accent-color: #3b82f6;








            
            --accent-hover: #2563eb;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .header {
            position: absolute;
            top: 2rem;
            left: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: flex;
            gap: 2rem;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            perspective: 1000px;
        }

        .glass-panel {
            background: var(--secondary-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.45);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .login-window {
            flex: 1;
            max-width: 450px;
            animation: slideInLeft 0.8s ease-out;
            z-index: 2;
        }

        .new-user-window {
            flex: 0.8;
            max-width: 380px;
            transform: scale(0.9);
            opacity: 0.9;
            background: rgba(255, 255, 255, 0.02);
            animation: slideInRight 0.8s ease-out;
            z-index: 1;
        }

        .new-user-window:hover {
            transform: scale(0.92) translateY(-5px);
            opacity: 1;
        }

        .title {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .input-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            color: var(--accent-color);
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn-primary:hover::after {
            left: 100%;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            margin-top: 1rem;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .forgot-password {
            display: block;
            text-align: right;
            font-size: 0.875rem;
            color: var(--accent-color);
            text-decoration: none;
            margin-top: -0.5rem;
            margin-bottom: 1.5rem;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--text-primary);
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--glass-border);
        }

        .divider:not(:empty)::before {
            margin-right: 0.5em;
        }

        .divider:not(:empty)::after {
            margin-left: 0.5em;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px) scale(0.9); }
            to { opacity: 0.9; transform: translateX(0) scale(0.9); }
        }

        /* Responsive */
        @media (max-width: 850px) {
            .container {
                flex-direction: column;
                padding: 5rem 1rem 2rem 1rem;
            }
            .login-window {
                width: 100%;
            }
            .new-user-window {
                width: 100%;
                max-width: 450px;
                transform: scale(1);
                opacity: 1;
            }
            .new-user-window:hover {
                transform: translateY(-5px);
            }
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 1000;
        }

        .toast {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideInRight 0.3s ease-out forwards;
            min-width: 300px;
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }
        
        .toast.error {
            border-left: 4px solid #ef4444;
        }
        
        .toast.loading {
            border-left: 4px solid var(--accent-color);
        }

        .toast-icon {
            font-size: 1.25rem;
        }

        /* Dashboard Styles */
        .dashboard {
            display: none;
            width: 100%;
            max-width: 1400px;
            padding: 2rem;
            animation: fadeInDown 0.8s ease-out;
            min-height: 100vh;
        }

        .dashboard.active {
            display: flex;
            flex-direction: column;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .category-tabs {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            width: fit-content;
        }

        .tab {
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .tab:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .tab.active {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-container input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
            width: 100%;
        }

        .product-card {
            background: var(--secondary-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(20px);
        }

        .product-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .product-img-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
            background: #fff;
            position: relative;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 1.5rem;
            transition: transform 0.6s ease;
        }

        .product-card:hover .product-img {
            transform: scale(1.1);
        }

        .product-info {
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            flex: 1;
            background: linear-gradient(180deg, transparent, rgba(0,0,0,0.2));
        }

        .product-tag {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-color);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            width: fit-content;
            margin-bottom: 0.75rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .product-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .variant-selector {
            margin: 1rem 0;
        }

        .variant-selector select {
            width: 100%;
            padding: 0.6rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        .product-price-container {
            margin-top: auto;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .product-price {
            font-size: 1.6rem;
            font-weight: 800;
            color: #10b981;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        .price-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .category-title {
            width: 100%;
            grid-column: 1 / -1;
            font-size: 1.75rem;
            font-weight: 800;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(59, 130, 246, 0.3);
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        /* Add to Cart & Product Detail Styles */
        .cart-btn {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            transition: all 0.3s ease;
        }

        .cart-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent-color);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-to-cart-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .view-detail-btn {
            margin-top: 0.5rem;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            width: 100%;
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }

        .view-detail-btn:hover {
            border-color: white;
            color: white;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 2rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #0f172a;
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 3rem;
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-modal {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .close-modal:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* Detail Page Layout */
        .product-detail-container {
            display: flex;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .detail-image {
            flex: 1;
            min-width: 300px;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            height: fit-content;
        }

        .detail-image img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .detail-info {
            flex: 1.2;
            min-width: 300px;
        }

        .detail-info .product-tag {
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }

        .detail-info .product-title {
            font-size: 2.2rem;
            margin-bottom: 1rem;
        }

        .detail-description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        /* Cart List */
        .cart-items-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .cart-item-img {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 12px;
            padding: 0.5rem;
            flex-shrink: 0;
        }

        .cart-item-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-info h4 {
            margin-bottom: 0.25rem;
        }

        .cart-item-info p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1rem;
            border-radius: 10px;
        }

        .qty-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .qty-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .cart-total {
            margin-top: 2rem;
            text-align: right;
            border-top: 1px solid var(--glass-border);
            padding-top: 1.5rem;
        }

        .cart-total h3 {
            font-size: 1.5rem;
            color: #10b981;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            margin-top: 2rem;
            cursor: pointer;
            font-size: 1.1rem;
        }

        /* Pagination Styles */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 4rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
        }

        .pagination-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pagination-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .pagination-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Improved Product Detail Modal Styles */
        .detail-tabs {
            display: flex;
            gap: 2rem;
            margin-top: 2.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }

        .detail-tab {
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            padding-bottom: 0.5rem;
            position: relative;
            transition: color 0.3s ease;
        }

        .detail-tab.active {
            color: var(--accent-color);
        }

        .detail-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-color);
        }

        .detail-tab-content {
            margin-top: 1.5rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .detail-tab-content.active {
            display: block;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;

    </style>
</head>
<body>

    <header class="header">
        <div class="logo-icon">G</div>
        <div class="logo-text">Gemini</div>
    </header>

    <div class="container">
        <!-- Main Login Window -->
        <main class="glass-panel login-window">
            <h1 class="title">Welcome Back</h1>
            <p class="subtitle">Enter your credentials to access the portal.</p>
            
            <form action="#" method="POST" id="loginForm">
                <div class="input-group">
                    <label for="email">Corporate Email</label>
                    <input type="email" id="email" name="email" placeholder="name@gemini.corp" required autocomplete="email">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                
                <a href="#" class="forgot-password">Forgot password?</a>
                
                <button type="submit" class="btn btn-primary">Sign In to Dashboard</button>
            </form>
        </main>

        <!-- New User Window (Smaller) -->
        <aside class="glass-panel new-user-window">
            <h2 class="title" style="font-size: 1.4rem;">New User?</h2>
            <p class="subtitle" style="margin-bottom: 1.5rem;">Join the Gemini ecosystem today.</p>
            
            <form action="#" method="POST" id="registerForm">
                <div class="input-group">
                    <label for="reg-email" style="font-size: 0.8rem;">Work Email</label>
                    <input type="email" id="reg-email" name="reg-email" placeholder="email@company.com" required style="padding: 0.75rem;">
                </div>
                
                <div class="input-group">
                    <label for="reg-token" style="font-size: 0.8rem;">Access Token</label>
                    <input type="text" id="reg-token" name="reg-token" placeholder="Provided by HR" required style="padding: 0.75rem;">
                </div>
                
                <button type="button" class="btn btn-secondary" style="padding: 0.75rem;">Request Access</button>
            </form>
        </aside>
    </div>

    <!-- Dashboard -->
    <main class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <div>
                <h1 class="title">Enterprise Portal</h1>
                <p class="subtitle" style="margin-bottom: 0;">Access curated premium inventory.</p>
            </div>
            
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="productSearch" placeholder="Search products, variants, or categories...">
            </div>

            <div class="cart-btn" id="cartBtn" onclick="toggleCart()">
                <span>🛒</span>
                <span class="cart-badge" id="cartBadge">0</span>
            </div>

            <button class="btn btn-secondary" style="width: auto; padding: 0.6rem 1.5rem; margin: 0; border-radius: 12px;" id="logoutBtn">Sign Out</button>
        </div>

        <div class="category-tabs" id="categoryTabs">
            <div class="tab active" data-category="all">All Products</div>
            <div class="tab" data-category="iPhone">iPhone</div>
            <div class="tab" data-category="iPad">iPad</div>
            <div class="tab" data-category="Mac">Mac</div>
            <div class="tab" data-category="Watch">Watch</div>
            <div class="tab" data-category="Audio">Audio</div>
            <div class="tab" data-category="Accessory">Accessories</div>
        </div>

        <div class="product-grid" id="productGrid">
            <!-- Products will be dynamically injected here -->
        </div>

        <div class="pagination" id="paginationControls">
            <!-- Pagination will be injected here -->
        </div>
    </main>

    <script>
        const products = [
            // iPhone 15 Series

            { brand: "Apple", category: "Mac", title: "MacBook Pro 14-inch (M3 Pro)", variants: [{ name: "18GB RAM / 512GB", price: 199900 }, { name: "36GB RAM / 1TB", price: 239900 }], image: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=800&q=80" },
            { brand: "Apple", category: "Mac", title: "MacBook Air 15-inch (M3)", variants: [{ name: "8GB / 256GB", price: 134900 }, { name: "16GB / 512GB", price: 154900 }], image: "https://images.unsplash.com/photo-1611186871348-b1ce696e52c9?w=800&q=80" },
            { brand: "Apple", category: "Mac", title: "MacBook Air 13-inch (M3)", variants: [{ name: "8GB / 256GB", price: 114900 }, { name: "16GB / 512GB", price: 134900 }], image: "https://images.unsplash.com/photo-1611186871348-b1ce696e52c9?w=800&q=80" },
            { brand: "Apple", category: "Mac", title: "iMac 24-inch (M3)", variants: [{ name: "8-Core GPU", price: 134900 }, { name: "10-Core GPU", price: 154900 }], image: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=800&q=80" },
            { brand: "Apple", category: "Mac", title: "Mac Studio (M2 Ultra)", variants: [{ name: "64GB RAM / 1TB", price: 419900 }, { name: "192GB RAM / 8TB", price: 879900 }], image: "https://images.unsplash.com/photo-1618252270966-4e50eb93b1eb?w=800&q=80" },
            { brand: "Apple", category: "Mac", title: "Mac Mini (M2)", variants: [{ name: "256GB SSD", price: 59900 }, { name: "512GB SSD", price: 79900 }], image: "https://images.unsplash.com/photo-1618252270966-4e50eb93b1eb?w=800&q=80" },

            // Watch Series
            { brand: "Apple", category: "Watch", title: "Apple Watch Ultra 2", variants: [{ name: "49mm Titanium", price: 89900 }], image: "https://images.unsplash.com/photo-1663248386445-56543bca4ce1?w=800&q=80" },
            { brand: "Apple", category: "Watch", title: "Apple Watch Series 9", variants: [{ name: "41mm GPS", price: 41900 }, { name: "45mm GPS", price: 44900 }, { name: "45mm Cellular", price: 54900 }], image: "https://images.unsplash.com/photo-1434493789847-2f02dc6ca35d?w=800&q=80" },
            { brand: "Apple", category: "Watch", title: "Apple Watch SE", variants: [{ name: "40mm GPS", price: 29900 }, { name: "44mm GPS", price: 32900 }], image: "https://images.unsplash.com/photo-1544117518-2b0417811c0d?w=800&q=80" },

            // Audio
            { brand: "Apple", category: "Audio", title: "AirPods Max", variants: [{ name: "Space Grey", price: 59900 }, { name: "Silver", price: 59900 }, { name: "Sky Blue", price: 59900 }], image: "https://images.unsplash.com/photo-1613040809024-b4ef7ba99bc3?w=800&q=80" },
            { brand: "Apple", category: "Audio", title: "AirPods Pro (2nd Gen)", variants: [{ name: "USB-C MagSafe", price: 24900 }], image: "https://images.unsplash.com/photo-1600294037681-c80b4cb5b434?w=800&q=80" },
            { brand: "Apple", category: "Audio", title: "AirPods (3rd Gen)", variants: [{ name: "Lightning Case", price: 18900 }, { name: "MagSafe Case", price: 19900 }], image: "https://images.unsplash.com/photo-1608156639585-b3a032ef9689?w=800&q=80" },
            { brand: "Apple", category: "Audio", title: "HomePod (2nd Gen)", variants: [{ name: "Midnight", price: 32900 }, { name: "White", price: 32900 }], image: "https://images.unsplash.com/photo-1616421528643-4a112dfd9d59?w=800&q=80" },

            // Accessories
            { brand: "Apple", category: "Accessory", title: "Apple Pencil (USB-C)", variants: [{ name: "Standard", price: 7900 }], image: "https://images.unsplash.com/photo-1602498226065-f480306ea64e?w=800&q=80" },
            { brand: "Apple", category: "Accessory", title: "Apple Pencil (2nd Gen)", variants: [{ name: "Standard", price: 11900 }], image: "https://images.unsplash.com/photo-1602498226065-f480306ea64e?w=800&q=80" },
            { brand: "Apple", category: "Accessory", title: "Magic Mouse", variants: [{ name: "White", price: 7500 }, { name: "Black", price: 9500 }], image: "https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=800&q=80" },
            { brand: "Apple", category: "Accessory", title: "Magic Keyboard (iPad Pro)", variants: [{ name: "11-inch", price: 29900 }, { name: "12.9-inch", price: 33900 }], image: "https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04?w=800&q=80" },
            { brand: "Apple", category: "Accessory", title: "AirTag", variants: [{ name: "1-Pack", price: 3490 }, { name: "4-Pack", price: 11900 }], image: "https://images.unsplash.com/photo-1623863749449-3652db6e3557?w=800&q=80" }
        ];

        let cart = [];
        let currentPage = 1;
        const itemsPerPage = 8;
        let currentFilter = 'all';

        // Add subtle interactive micro-animations
        const inputs = document.querySelectorAll('input');
        
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'translateY(-2px)';
                this.parentElement.style.transition = 'transform 0.3s ease';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'translateY(0)';
            });
        });

        // Toast Notification System
        function showToast(message, type = 'success') {
            let container = document.querySelector('.toast-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'toast-container';
                document.body.appendChild(container);
            }

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = '✓';
            if (type === 'error') icon = '✕';
            if (type === 'loading') icon = '⟳';

            toast.innerHTML = `<span class="toast-icon">${icon}</span> <span>${message}</span>`;
            
            container.appendChild(toast);

            if (type !== 'loading') {
                setTimeout(() => {
                    toast.style.animation = 'fadeOutRight 0.5s ease forwards';
                    setTimeout(() => {
                        if (toast.parentElement) toast.remove();
                    }, 500);
                }, 3000);
            }
            
            return toast;
        }

        // Login Form Handler
        const loginForm = document.getElementById('loginForm');
        const loginBtn = loginForm.querySelector('button[type="submit"]');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showToast('Please fill in all fields.', 'error');
                return;
            }

            const originalText = loginBtn.textContent;
            loginBtn.textContent = 'Authenticating...';
            loginBtn.disabled = true;
            
            const loadingToast = showToast('Verifying credentials...', 'loading');

            // Simulate API Call
            setTimeout(() => {
                loadingToast.remove();
                
                if (email.includes('@')) { // Relaxed validation for testing
                    showToast('Authentication successful! Loading catalog...', 'success');
                    // Reset after delay
                    setTimeout(() => {
                        loginBtn.textContent = originalText;
                        loginBtn.disabled = false;
                        loginForm.reset();
                        
                        // Switch to dashboard
                        document.querySelector('.container').style.display = 'none';
                        document.getElementById('dashboard').classList.add('active');
                        renderProducts();
                    }, 1500);
                } else {
                    showToast('Please enter a valid email.', 'error');
                    loginBtn.textContent = originalText;
                    loginBtn.disabled = false;
                }
            }, 1000);
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            document.getElementById('dashboard').classList.remove('active');
            document.querySelector('.container').style.display = 'flex';
        });

        function formatPrice(price) {
            return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(price);
        }

        function renderProducts(searchQuery = '') {
            const grid = document.getElementById('productGrid');
            const paginationContainer = document.getElementById('paginationControls');
            grid.innerHTML = '';
            
            const searchTerm = searchQuery.toLowerCase();
            const filteredProducts = products.filter(p => {
                const matchesSearch = p.title.toLowerCase().includes(searchTerm) || 
                                     p.category.toLowerCase().includes(searchTerm) ||
                                     p.brand.toLowerCase().includes(searchTerm);
                const matchesCategory = currentFilter === 'all' || p.category === currentFilter;
                return matchesSearch && matchesCategory;
            });

            if (filteredProducts.length === 0) {
                grid.innerHTML = '<div class="no-results">No products found matching your criteria.</div>';
                paginationContainer.innerHTML = '';
                return;
            }

            // Pagination Slicing
            const totalItems = filteredProducts.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            // Fix current page if out of bounds
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedProducts = filteredProducts.slice(startIndex, endIndex);

            let lastCategory = '';

            paginatedProducts.forEach((product, index) => {
                // Show category headers if in 'all' view and category changes
                if (currentFilter === 'all' && product.category !== lastCategory && searchQuery === '') {
                    const header = document.createElement('h2');
                    header.className = 'category-title';
                    header.style.width = '100%';
                    header.style.margin = '2rem 0 1rem';
                    header.textContent = product.category;
                    grid.appendChild(header);
                    lastCategory = product.category;
                }

                const card = document.createElement('div');
                card.className = 'product-card';
                
                setTimeout(() => card.classList.add('show'), index * 30);

                const globalIndex = products.indexOf(product);
                const productId = `prod-${globalIndex}`;
                
                card.innerHTML = `
                    <div class="product-img-container" onclick="openProductDetail(${globalIndex})">
                        <img src="${product.image}" alt="${product.title}" class="product-img" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=800&q=80'">
                    </div>
                    <div class="product-info">
                        <div class="product-tag">${product.brand}</div>
                        <h3 class="product-title">${product.title}</h3>
                        
                        <div class="variant-selector">
                            <label style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.25rem; display: block;">Select Variant</label>
                            <select id="select-${productId}" onchange="updatePrice('${productId}', this.value)">
                                ${product.variants.map((v, i) => `<option value="${v.price}" data-name="${v.name}">${v.name}</option>`).join('')}
                            </select>
                        </div>

                        <div class="product-price-container">
                            <span class="product-price" id="price-${productId}">${formatPrice(product.variants[0].price)}</span>
                            <span class="price-label">Excl. Tax</span>
                        </div>

                        <button class="add-to-cart-btn" onclick="handleAddToCart(${globalIndex}, '${productId}')">Add to Cart</button>
                        <button class="view-detail-btn" onclick="openProductDetail(${globalIndex})">View Full Details</button>
                    </div>
                `;
                grid.appendChild(card);
            });

            renderPagination(totalItems);
        }

        function renderPagination(totalItems) {
            const container = document.getElementById('paginationControls');
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = `
                <button class="pagination-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(-1)">
                    <span>←</span> Previous
                </button>
                <div class="page-info">Page ${currentPage} of ${totalPages}</div>
                <button class="pagination-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(1)">
                    Next <span>→</span>
                </button>
            `;
        }

        function changePage(delta) {
            currentPage += delta;
            renderProducts(document.getElementById('productSearch').value);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Cart & Modal Logic
        function handleAddToCart(productIndex, elementId) {
            const product = products[productIndex];
            const select = document.getElementById(`select-${elementId}`);
            const price = parseInt(select.value);
            const variantName = select.options[select.selectedIndex].getAttribute('data-name');
            
            addToCart(product.title, product.brand, product.image, price, variantName);
        }

        function addToCart(title, brand, image, price, variantName) {
            const itemId = `${title}-${variantName}`;
            const existingItem = cart.find(item => item.itemId === itemId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    itemId,
                    title,
                    brand,
                    image,
                    price,
                    variantName,
                    quantity: 1
                });
            }

            updateCartBadge();
            showToast(`Added ${title} (${variantName}) to cart!`, 'success');
        }

        function updateCartBadge() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = totalItems;
        }

        function toggleCart() {
            const overlay = document.getElementById('modalOverlay');
            const body = document.getElementById('modalBody');
            
            if (overlay.classList.contains('active')) {
                overlay.classList.remove('active');
            } else {
                renderCart();
                overlay.classList.add('active');
            }
        }

        function renderCart() {
            const body = document.getElementById('modalBody');
            if (cart.length === 0) {
                body.innerHTML = `
                    <div style="text-align: center; padding: 3rem;">
                        <h2 style="margin-bottom: 1rem;">Your Cart is Empty</h2>
                        <p style="color: var(--text-secondary);">Browse our catalog to add premium products.</p>
                        <button class="add-to-cart-btn" style="width: auto; padding: 0.75rem 2rem; margin-top: 2rem;" onclick="toggleCart()">Start Shopping</button>
                    </div>
                `;
                return;
            }

            let total = 0;
            const itemsHtml = cart.map((item, index) => {
                total += item.price * item.quantity;
                return `
                    <div class="cart-item">
                        <div class="cart-item-img">
                            <img src="${item.image}" alt="${item.title}">
                        </div>
                        <div class="cart-item-info">
                            <h4>${item.title}</h4>
                            <p>${item.variantName} • ${formatPrice(item.price)}</p>
                        </div>
                        <div class="cart-item-qty">
                            <button class="qty-btn" onclick="updateQuantity('${item.itemId}', -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity('${item.itemId}', 1)">+</button>
                        </div>
                        <div style="font-weight: 700; width: 100px; text-align: right;">
                            ${formatPrice(item.price * item.quantity)}
                        </div>
                    </div>
                `;
            }).join('');

            body.innerHTML = `
                <h2 style="margin-bottom: 2rem;">Shopping Cart</h2>
                <div class="cart-items-list">
                    ${itemsHtml}
                </div>
                <div class="cart-total">
                    <p style="color: var(--text-secondary); margin-bottom: 0.5rem;">Estimated Total (Excl. Tax)</p>
                    <h3>${formatPrice(total)}</h3>
                </div>
                <button class="checkout-btn" onclick="handleCheckout()">Proceed to Enterprise Checkout</button>
            `;
        }

        function updateQuantity(itemId, delta) {
            const item = cart.find(i => i.itemId === itemId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.itemId !== itemId);
                }
                updateCartBadge();
                renderCart();
            }
        }

        function handleCheckout() {
            showToast('Initializing secure enterprise checkout...', 'loading');
            setTimeout(() => {
                showToast('Checkout simulated. Order request sent to procurement.', 'success');
                cart = [];
                updateCartBadge();
                toggleCart();
            }, 2000);
        }

        // Product Detail Logic
        function openProductDetail(productIndex) {
            const product = products[productIndex];
            if (!product) {
                showToast('Product data not found.', 'error');
                return;
            }

            const overlay = document.getElementById('modalOverlay');
            const body = document.getElementById('modalBody');
            
            if (!overlay || !body) {
                console.error('Modal elements not found in DOM');
                return;
            }

            const overviewDescription = "Experience the pinnacle of engineering with the " + product.title + ". Designed for elite performance and unmatched reliability, this " + product.brand + " masterpiece sets a new standard for excellence in the " + product.category + " ecosystem.";

            body.innerHTML = `
                <div class="product-detail-container">
                    <div class="detail-image">
                        <img src="${product.image}" alt="${product.title}">
                    </div>
                    <div class="detail-info">
                        <div class="product-tag">${product.brand} • ${product.category}</div>
                        <h2 class="product-title" style="margin-bottom: 0.5rem;">${product.title}</h2>
                        <div style="display: flex; gap: 0.5rem; color: #fbbf24; margin-bottom: 1.5rem; font-size: 0.9rem;">
                            <span>★★★★★</span>
                            <span style="color: var(--text-secondary);">(4.9/5 Based on 2,450 Reviews)</span>
                        </div>
                        
                        <div class="variant-selector">
                            <label style="font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: block;">Select Configuration</label>
                            <select id="detail-select" onchange="updateDetailPrice(this.value)">
                                ${product.variants.map((v, i) => `<option value="${v.price}" data-name="${v.name}">${v.name}</option>`).join('')}
                            </select>
                        </div>

                        <div class="product-price-container" style="margin: 2rem 0;">
                            <span class="product-price" id="detail-price" style="font-size: 2.5rem;">${formatPrice(product.variants[0].price)}</span>
                            <span class="price-label">Excl. Tax</span>
                        </div>

                        <div style="display: flex; gap: 1rem; align-items: flex-end;">
                            <div style="flex: 1;">
                                <label style="font-size: 0.75rem; color: var(--text-secondary); display: block; margin-bottom: 0.5rem;">Quantity</label>
                                <div class="qty-selector">
                                    <button class="qty-btn" onclick="updateDetailQty(-1)">-</button>
                                    <span id="detail-qty">1</span>
                                    <button class="qty-btn" onclick="updateDetailQty(1)">+</button>
                                </div>
                            </div>
                            <button class="add-to-cart-btn" style="padding: 1rem; flex: 2; margin-top: 0;" onclick="handleDetailAddToCart(${productIndex})">Add to Dashboard Cart</button>
                        </div>

                        <div class="highlights">
                            <div class="highlight-item"><span>🛡️</span> 2 Year Warranty</div>
                            <div class="highlight-item"><span>🚚</span> Fast Delivery</div>
                            <div class="highlight-item"><span>🔄</span> 30 Day Return</div>
                        </div>
                    </div>
                </div>

                <div class="detail-tabs">
                    <div class="detail-tab active" onclick="switchDetailTab(event, 'overview')">Overview</div>
                    <div class="detail-tab" onclick="switchDetailTab(event, 'specs')">Specifications</div>
                    <div class="detail-tab" onclick="switchDetailTab(event, 'shipping')">Shipping & Returns</div>
                </div>

                <div id="overview" class="detail-tab-content active">
                    <p class="detail-description">${overviewDescription}</p>
                    <p class="detail-description" style="margin-top: 1rem;">This high-performance device is optimized for professional workflows, offering industry-leading efficiency and seamless integration into the Gemini Enterprise network.</p>
                </div>

                <div id="specs" class="detail-tab-content">
                    <div class="specs-grid">
                        <div class="spec-item">
                            <div class="spec-label">Processor</div>
                            <div class="spec-value">Enterprise Gen-3 Chip</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Connectivity</div>
                            <div class="spec-value">5G / Wi-Fi 6E / Bluetooth 5.3</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Build Material</div>
                            <div class="spec-value">Aerospace-grade Aluminum</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">Battery Life</div>
                            <div class="spec-value">Up to 24 Hours Active Use</div>
                        </div>
                    </div>
                </div>

                <div id="shipping" class="detail-tab-content">
                    <p class="detail-description">All enterprise orders are processed within 24 hours. We offer complimentary express shipping globally for corporate accounts.</p>
                    <ul style="margin-top: 1rem; color: var(--text-secondary); line-height: 1.8; margin-left: 1.5rem;">
                        <li>Standard Delivery: 3-5 Business Days</li>
                        <li>Express Delivery: 1-2 Business Days</li>
                        <li>Return Policy: No-questions-asked 30-day return for corporate inventory.</li>
                    </ul>
                </div>
            `;

            overlay.classList.add('active');
        }

        function switchDetailTab(event, tabId) {
            document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.detail-tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        let detailQty = 1;
        function updateDetailQty(delta) {
            detailQty += delta;
            if (detailQty < 1) detailQty = 1;
            document.getElementById('detail-qty').textContent = detailQty;
        }

        function updateDetailPrice(price) {
            document.getElementById('detail-price').textContent = formatPrice(price);
        }

        function handleDetailAddToCart(productIndex) {
            const product = products[productIndex];
            const select = document.getElementById('detail-select');
            const price = parseInt(select.value);
            const variantName = select.options[select.selectedIndex].getAttribute('data-name');
            
            for(let i=0; i<detailQty; i++) {
                addToCart(product.title, product.brand, product.image, price, variantName);
            }
            detailQty = 1; // Reset for next use
        }

        // Close Modal Events
        document.getElementById('closeModal').onclick = () => {
            document.getElementById('modalOverlay').classList.remove('active');
        };

        window.onclick = (event) => {
            const overlay = document.getElementById('modalOverlay');
            if (event.target == overlay) {
                overlay.classList.remove('active');
            }
        };

        function updatePrice(id, price) {
            document.getElementById(`price-${id}`).textContent = formatPrice(price);
        }

        // Search logic
        document.getElementById('productSearch').addEventListener('input', (e) => {
            currentPage = 1;
            renderProducts(e.target.value);
        });

        // Tab logic
        document.getElementById('categoryTabs').addEventListener('click', (e) => {
            if (e.target.classList.contains('tab')) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.category;
                currentPage = 1;
                renderProducts(document.getElementById('productSearch').value);
            }
        });


        // Register Form Handler
        const registerForm = document.getElementById('registerForm');
        const reqAccessBtn = registerForm.querySelector('button');

        reqAccessBtn.addEventListener('click', () => {
            const email = document.getElementById('reg-email').value;
            const token = document.getElementById('reg-token').value;

            if (!email || !token) {
                showToast('Email and token are required.', 'error');
                return;
            }

            const originalText = reqAccessBtn.textContent;
            reqAccessBtn.textContent = 'Verifying Token...';
            reqAccessBtn.disabled = true;

            const loadingToast = showToast('Checking authorization...', 'loading');

            // Simulate API Call
            setTimeout(() => {
                loadingToast.remove();
                showToast('Access request submitted to HR.', 'success');
                
                setTimeout(() => {
                    reqAccessBtn.textContent = originalText;
                    reqAccessBtn.disabled = false;
                    registerForm.reset();
                }, 1500);
            }, 1500);
        });
    </script>
    <!-- Modal Overlay for Cart and Product Details -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="close-modal" id="closeModal">&times;</button>
            <div id="modalBody">
                <!-- Content will be dynamically injected here -->
            </div>
        </div>
    </div>
</body>
</html>
