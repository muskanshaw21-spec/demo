<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini - Corporate Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0b0f19;
            --secondary-bg: rgba(255, 255, 255, 0.03);
            --accent-color: #3b82f6;








            
            --accent-hover: #2563eb;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .header {
            position: absolute;
            top: 2rem;
            left: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: flex;
            gap: 2rem;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            perspective: 1000px;
        }

        .glass-panel {
            background: var(--secondary-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.45);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .login-window {
            flex: 1;
            max-width: 450px;
            animation: slideInLeft 0.8s ease-out;
            z-index: 2;
        }

        .new-user-window {
            flex: 0.8;
            max-width: 380px;
            transform: scale(0.9);
            opacity: 0.9;
            background: rgba(255, 255, 255, 0.02);
            animation: slideInRight 0.8s ease-out;
            z-index: 1;
        }

        .new-user-window:hover {
            transform: scale(0.92) translateY(-5px);
            opacity: 1;
        }

        .title {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .input-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            color: var(--accent-color);
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn-primary:hover::after {
            left: 100%;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            margin-top: 1rem;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .forgot-password {
            display: block;
            text-align: right;
            font-size: 0.875rem;
            color: var(--accent-color);
            text-decoration: none;
            margin-top: -0.5rem;
            margin-bottom: 1.5rem;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--text-primary);
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--glass-border);
        }

        .divider:not(:empty)::before {
            margin-right: 0.5em;
        }

        .divider:not(:empty)::after {
            margin-left: 0.5em;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px) scale(0.9); }
            to { opacity: 0.9; transform: translateX(0) scale(0.9); }
        }

        /* Responsive */
        @media (max-width: 850px) {
            .container {
                flex-direction: column;
                padding: 5rem 1rem 2rem 1rem;
            }
            .login-window {
                width: 100%;
            }
            .new-user-window {
                width: 100%;
                max-width: 450px;
                transform: scale(1);
                opacity: 1;
            }
            .new-user-window:hover {
                transform: translateY(-5px);
            }
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 1000;
        }

        .toast {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideInRight 0.3s ease-out forwards;
            min-width: 300px;
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }
        
        .toast.error {
            border-left: 4px solid #ef4444;
        }
        
        .toast.loading {
            border-left: 4px solid var(--accent-color);
        }

        .toast-icon {
            font-size: 1.25rem;
        }

        @keyframes fadeOutRight {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100px); }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-icon">G</div>
        <div class="logo-text">Gemini</div>
    </header>

    <div class="container">
        <!-- Main Login Window -->
        <main class="glass-panel login-window">
            <h1 class="title">Welcome Back</h1>
            <p class="subtitle">Enter your credentials to access the portal.</p>
            
            <form action="#" method="POST" id="loginForm">
                <div class="input-group">
                    <label for="email">Corporate Email</label>
                    <input type="email" id="email" name="email" placeholder="name@gemini.corp" required autocomplete="email">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                
                <a href="#" class="forgot-password">Forgot password?</a>
                
                <button type="submit" class="btn btn-primary">Sign In to Dashboard</button>
            </form>
        </main>

        <!-- New User Window (Smaller) -->
        <aside class="glass-panel new-user-window">
            <h2 class="title" style="font-size: 1.4rem;">New User?</h2>
            <p class="subtitle" style="margin-bottom: 1.5rem;">Join the Gemini ecosystem today.</p>
            
            <form action="#" method="POST" id="registerForm">
                <div class="input-group">
                    <label for="reg-email" style="font-size: 0.8rem;">Work Email</label>
                    <input type="email" id="reg-email" name="reg-email" placeholder="email@company.com" required style="padding: 0.75rem;">
                </div>
                
                <div class="input-group">
                    <label for="reg-token" style="font-size: 0.8rem;">Access Token</label>
                    <input type="text" id="reg-token" name="reg-token" placeholder="Provided by HR" required style="padding: 0.75rem;">
                </div>
                
                <button type="button" class="btn btn-secondary" style="padding: 0.75rem;">Request Access</button>
            </form>
        </aside>
    </div>

    <script>
        // Add subtle interactive micro-animations
        const inputs = document.querySelectorAll('input');
        
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'translateY(-2px)';
                this.parentElement.style.transition = 'transform 0.3s ease';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'translateY(0)';
            });
        });

        // Toast Notification System
        function showToast(message, type = 'success') {
            let container = document.querySelector('.toast-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'toast-container';
                document.body.appendChild(container);
            }

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = '✓';
            if (type === 'error') icon = '✕';
            if (type === 'loading') icon = '⟳';

            toast.innerHTML = `<span class="toast-icon">${icon}</span> <span>${message}</span>`;
            
            container.appendChild(toast);

            if (type !== 'loading') {
                setTimeout(() => {
                    toast.style.animation = 'fadeOutRight 0.5s ease forwards';
                    setTimeout(() => {
                        if (toast.parentElement) toast.remove();
                    }, 500);
                }, 3000);
            }
            
            return toast;
        }

        // Login Form Handler
        const loginForm = document.getElementById('loginForm');
        const loginBtn = loginForm.querySelector('button[type="submit"]');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showToast('Please fill in all fields.', 'error');
                return;
            }

            const originalText = loginBtn.textContent;
            loginBtn.textContent = 'Authenticating...';
            loginBtn.disabled = true;
            
            const loadingToast = showToast('Verifying credentials...', 'loading');

            // Simulate API Call
            setTimeout(() => {
                loadingToast.remove();
                
                if (email.includes('gemini.corp')) {
                    showToast('Authentication successful! Redirecting...', 'success');
                    // Reset after delay
                    setTimeout(() => {
                        loginBtn.textContent = originalText;
                        loginBtn.disabled = false;
                        loginForm.reset();
                    }, 2000);
                } else {
                    showToast('Invalid corporate email domain.', 'error');
                    loginBtn.textContent = originalText;
                    loginBtn.disabled = false;
                }
            }, 1500);
        });

        // Register Form Handler
        const registerForm = document.getElementById('registerForm');
        const reqAccessBtn = registerForm.querySelector('button');

        reqAccessBtn.addEventListener('click', () => {
            const email = document.getElementById('reg-email').value;
            const token = document.getElementById('reg-token').value;

            if (!email || !token) {
                showToast('Email and token are required.', 'error');
                return;
            }

            const originalText = reqAccessBtn.textContent;
            reqAccessBtn.textContent = 'Verifying Token...';
            reqAccessBtn.disabled = true;

            const loadingToast = showToast('Checking authorization...', 'loading');

            // Simulate API Call
            setTimeout(() => {
                loadingToast.remove();
                showToast('Access request submitted to HR.', 'success');
                
                setTimeout(() => {
                    reqAccessBtn.textContent = originalText;
                    reqAccessBtn.disabled = false;
                    registerForm.reset();
                }, 1500);
            }, 1500);
        });
    </script>
</body>
</html>
